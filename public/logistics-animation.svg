<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-label="Animated logistics hero with multi-layer parallax, routes, vehicles, particles and a plane banner that reads LEXD" preserveAspectRatio="xMidYMid slice" role="img" viewBox="0 0 1600 700"><defs><linearGradient id="skyG" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#062033"/><stop offset=".36" stop-color="#0b4168"/><stop offset="1" stop-color="#02202c"/></linearGradient><linearGradient id="horizonG" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#0f5a8a"/><stop offset="1" stop-color="#0a2740"/></linearGradient><radialGradient id="softHalo" cx="20%" cy="20%" r="60%"><stop offset="0" stop-color="#3fb0ff" stop-opacity=".12"/><stop offset="1" stop-color="#3fb0ff" stop-opacity="0"/></radialGradient><linearGradient id="routeGlow" x1="0" x2="1"><stop offset="0" stop-color="#9fd3ff"/><stop offset="1" stop-color="#dff9ff" stop-opacity=".9"/></linearGradient><linearGradient id="vehicleAccent" x1="0" x2="1"><stop offset="0" stop-color="#ff6b6b"/><stop offset="1" stop-color="#3fb0ff"/></linearGradient><filter id="glowLarge" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur in="SourceGraphic" result="b" stdDeviation="18"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="grain"><feTurbulence baseFrequency=".8" numOctaves="2" result="noise" stitchTiles="stitch" type="fractalNoise"/><feColorMatrix in="noise" type="saturate" values="0"/><feComponentTransfer><feFuncA tableValues="0 0.06" type="table"/></feComponentTransfer><feComposite in2="SourceGraphic" operator="over"/></filter><filter id="waterDisp"><feTurbulence baseFrequency=".004" numOctaves="3" result="turb"/><feDisplacementMap in="SourceGraphic" in2="turb" scale="6" xChannelSelector="R" yChannelSelector="G"/></filter><clipPath id="heroClip"><rect width="1600" height="700" x="0" y="0" rx="6" ry="6"/></clipPath><g id="plane"><g id="planeBody" transform="translate(0,0) scale(1)"><path fill="#fff" d="M0 6 L28 0 L26 6 L28 12 L0 6 Z"/><rect width="20" height="1.6" x="4" y="6.2" fill="#cfeeff" opacity=".95"/></g><g id="planeBanner" transform="translate(-130,2)"><rect width="140" height="22" x="0" y="-10" fill="#ff6b6b" opacity=".95" rx="8"/><text x="70" y="6" fill="#fff" alignment-baseline="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial" font-size="12.5" font-weight="700" text-anchor="middle">LEXD</text><animateTransform id="bannerFlutter" fill="freeze" attributeName="transform" attributeType="XML" begin="0s" dur="0.9s" from="-2 70 1" repeatCount="indefinite" to="2 70 1" type="rotate"/></g></g><g id="ship"><path fill="#062033" d="M0 16 L160 16 L150 28 L10 28 Z"/><rect width="40" height="16" x="10" y="-6" fill="#ff6b6b" rx="2"/><rect width="40" height="16" x="56" y="-6" fill="#3fb0ff" rx="2"/><rect width="40" height="16" x="102" y="-6" fill="#fff" rx="2"/><rect width="144" height="12" x="8" y="4" fill="#021726" rx="2"/></g><g id="truck"><rect width="92" height="40" x="0" y="4" fill="#1b3a57" rx="6"/><rect width="30" height="22" x="54" y="12" fill="#dff4ff" rx="3"/><circle cx="20" cy="52" r="8" fill="#fff"/><circle cx="64" cy="52" r="8" fill="#fff"/><path fill="#0f4c81" d="M0 10 h30 v24 h-30 z" opacity=".06"/></g><g id="drone"><circle cx="0" cy="0" r="8" fill="#fff"/><rect width="36" height="6" x="-18" y="8" fill="#cfeeff" opacity=".9" rx="3"/><path stroke="#cfeeff" stroke-width="1" d="M-30 0 h-8 M30 0 h8 M0 -30 v-8 M0 30 v8" opacity=".6"/></g><g id="containerBox"><rect width="64" height="40" x="0" y="0" fill="#08324a" rx="5"/><path stroke="#dff4ff" stroke-linecap="round" stroke-opacity=".26" stroke-width="1.2" d="M6 8h52M6 16h52M6 24h52"/></g><path id="pRoute1" fill="none" d="M40 360 C220 200, 420 200, 640 360 C860 520, 1080 520, 1320 360"/><path id="pRoute2" fill="none" d="M100 420 C260 320, 520 320, 700 420 C900 520, 1140 480, 1400 360"/><path id="pRoute3" fill="none" d="M360 540 C420 380, 620 300, 820 360 C980 410, 1220 420, 1450 340"/><g id="node"><circle r="5" fill="#fff" opacity=".98"/><circle r="12" fill="#3fb0ff" opacity=".06"/></g></defs><g clip-path="url(#heroClip)"><rect width="100%" height="100%" fill="url(#skyG)"/><g id="horizonBand" filter="url(#glowLarge)" opacity=".95"><rect width="1600" height="220" x="0" y="300" fill="url(#horizonG)" opacity=".35"/><rect width="540" height="260" x="60" y="220" fill="url(#softHalo)" opacity=".2" rx="18"/></g><g id="continents" opacity=".06"><path fill="#fff" d="M120 420 C200 300, 420 260, 660 340 C900 420, 1180 380, 1430 320 L1430 480 L0 480 Z" transform="translate(0, -20)"/></g><g id="depthRoutes" opacity=".08" transform="translate(0,0)"><use fill="none" stroke="#fff" stroke-linecap="round" stroke-opacity=".035" stroke-width="48" href="#pRoute1"/><use fill="none" stroke="#fff" stroke-linecap="round" stroke-opacity=".03" stroke-width="34" href="#pRoute2"/></g><g id="routesFG" stroke-linecap="round" stroke-opacity=".95" stroke-width="2.2"><use stroke="url(#routeGlow)" stroke-dasharray="8 10" class="r1" href="#pRoute1"/><use stroke="url(#routeGlow)" stroke-dasharray="3 7" class="r2" href="#pRoute2"/><use stroke="#7fd0ff" stroke-dasharray="2 9" class="r3" href="#pRoute3" opacity=".75"/></g><g id="routeGlowLayer" filter="url(#glowLarge)" opacity=".18"><use fill="none" stroke="#3fb0ff" stroke-linecap="round" stroke-opacity=".04" stroke-width="18" href="#pRoute1"/></g><g id="nodes1"><g transform="translate(-20,-10)"><use href="#node"/><animateMotion dur="9.6s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#pRoute1"/></animateMotion><animate attributeName="opacity" dur="4.8s" repeatCount="indefinite" values="0.98;0.6;0.98"/></g><g transform="translate(-60,0)"><use href="#node" transform="scale(0.8)"/><animateMotion dur="13.2s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#pRoute1"/></animateMotion><animate attributeName="opacity" dur="5.2s" repeatCount="indefinite" values="0.9;0.48;0.9"/></g></g><g id="vehicles"><g id="planeL" opacity=".98" transform="translate(0,0)"><use width="170" height="36" href="#plane"/><animateMotion dur="8.2s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#pRoute2"/></animateMotion><animateTransform attributeName="transform" dur="6s" repeatCount="indefinite" type="scale" values="1;0.96;1"/></g><g id="shipL" opacity=".98"><use width="160" height="46" href="#ship"/><animateMotion dur="15s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#pRoute3"/></animateMotion><animateTransform attributeName="transform" dur="7s" repeatCount="indefinite" type="translate" values="0,0; 0,-10; 0,0"/></g><g id="truckL" opacity=".98"><use width="92" height="52" href="#truck"/><animateMotion dur="11.2s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#pRoute1"/></animateMotion><animateTransform attributeName="transform" dur="8.5s" repeatCount="indefinite" type="scale" values="0.94;1.06;0.94"/></g><g id="droneL" opacity=".98" transform="translate(920,120)"><use width="22" height="22" href="#drone"/><animateTransform attributeName="transform" dur="11.6s" repeatCount="indefinite" type="translate" values="920,120; 980,92; 920,120; 860,92; 920,120"/><animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0.98;0.68;0.98"/></g></g><g id="foregroundBoxes"><g opacity=".98" transform="translate(300,180)"><use width="64" height="40" href="#containerBox"/><animateTransform attributeName="transform" dur="6.6s" repeatCount="indefinite" type="translate" values="300,180; 340,165; 300,180"/></g><g opacity=".98" transform="translate(760,150)"><use width="64" height="40" href="#containerBox"/><animateTransform attributeName="transform" dur="7.2s" repeatCount="indefinite" type="translate" values="760,150; 722,138; 760,150"/></g><g opacity=".98" transform="translate(1120,220)"><use width="64" height="40" href="#containerBox"/><animateTransform attributeName="transform" dur="8.2s" repeatCount="indefinite" type="translate" values="1120,220; 1164,206; 1120,220"/></g></g><g id="particleLayer" opacity=".92"><g id="pGroup"><circle cx="120" cy="80" r="2.4" fill="#dff4ff" class="p" opacity=".92"/><circle cx="340" cy="60" r="1.8" fill="#cfeeff" class="p" opacity=".86"/><circle cx="520" cy="40" r="2.2" fill="#eaffff" class="p" opacity=".88"/><circle cx="760" cy="70" r="1.6" fill="#bfe9ff" class="p" opacity=".8"/><circle cx="980" cy="42" r="2" fill="#dff4ff" class="p" opacity=".9"/><circle cx="1160" cy="110" r="1.8" fill="#cfeeff" class="p" opacity=".78"/><circle cx="1360" cy="74" r="2.6" fill="#eaffff" class="p" opacity=".92"/><circle cx="200" cy="140" r="1.6" fill="#dff4ff" class="p" opacity=".75"/><circle cx="420" cy="160" r="2" fill="#cfeeff" class="p" opacity=".82"/><circle cx="660" cy="120" r="1.4" fill="#eaffff" class="p" opacity=".68"/><circle cx="900" cy="200" r="2.2" fill="#bfe9ff" class="p" opacity=".9"/><circle cx="1240" cy="160" r="1.6" fill="#dff4ff" class="p" opacity=".76"/></g></g><g opacity=".04"><circle cx="240" cy="62" r="48" fill="#fff"/><circle cx="1120" cy="34" r="32" fill="#fff"/></g><rect width="640" height="240" x="48" y="48" fill="rgba(3,12,27,0.18)" rx="12"/><title>LEXDExpress advanced hero animation with moving banner</title><desc>Complex vector hero with multi-layer parallax, animated routes and vehicles. A plane carries a banner that reads LEXD.</desc></g><style>@keyframes dash1{to{stroke-dashoffset:-300}}@keyframes dash2{to{stroke-dashoffset:-450}}@keyframes dash3{to{stroke-dashoffset:-220}}@keyframes fadeIn{to{opacity:1}}svg{font-family:system-ui,-apple-system,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial;display:block}.r1{animation:dash1 9.2s linear infinite}.r1,.r2,.r3{stroke-dashoffset:0}.r2{animation:dash2 12.4s linear infinite}.r3{animation:dash3 10.1s linear infinite}circle,g,path,use{opacity:0;transform-origin:center center;animation:fadeIn 1.1s ease-out forwards}#foregroundBoxes,#particleLayer,#routesFG,#vehicles{animation-delay:.18s}#horizonBand{animation-delay:.02s}@media (prefers-reduced-motion:reduce){.r1,.r2,.r3{animation:none!important;stroke-dashoffset:0!important}animate,animateMotion,animateTransform{begin:0s;dur:.001s;repeatCount:1;fill:freeze}#planeBanner animateTransform{display:none!important}}.p{will-change:transform,opacity}</style><script type="application/ecmascript"><![CDATA[
    (function(){
      try {
        var svg = document.currentScript.ownerDocument;
        var prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (prefersReduced) {
          svg.documentElement.classList.add('reduced-motion');
          return;
        }

        var pGroup = svg.getElementById('pGroup');
        if (!pGroup) return;

        var particles = Array.prototype.slice.call(pGroup.querySelectorAll('.p'));
        var seeds = particles.map(function(p){
          return {
            el: p,
            cx: parseFloat(p.getAttribute('cx')||0),
            cy: parseFloat(p.getAttribute('cy')||0),
            vx: (Math.random()*0.6 - 0.3),
            vy: (Math.random()*0.3 - 0.15),
            amp: 12 + Math.random()*26,
            phase: Math.random()*Math.PI*2,
            speed: 0.004 + Math.random()*0.01
          };
        });

        var last = performance.now();
        var t0 = last;

        function tick(now){
          var dt = (now - last);
          last = now;
          var elapsed = (now - t0);

          var parx = Math.sin(elapsed*0.0004) * 18;
          var pary = Math.cos(elapsed*0.00028) * 10;

          seeds.forEach(function(s, i){
            s.phase += s.speed * dt;
            var nx = s.cx + Math.cos(s.phase) * s.amp + parx * (0.3 + i%3*0.12);
            var ny = s.cy + Math.sin(s.phase*1.1) * (s.amp*0.45) + pary * (0.2 + (i%4)*0.07);
            s.el.setAttribute('cx', nx.toFixed(2));
            s.el.setAttribute('cy', ny.toFixed(2));
            var op = 0.7 + 0.25 * (0.5 + 0.5*Math.sin(s.phase*1.7 + i));
            s.el.setAttribute('opacity', op.toFixed(3));
          });

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);

        var root = svg.documentElement;
        var supportsPointer = 'onpointermove' in window;
        var handler = function(e){
          var rect = root.getBoundingClientRect();
          var mx = (e.clientX - rect.left) / rect.width - 0.5;
          var my = (e.clientY - rect.top) / rect.height - 0.5;
          var depthRoutes = svg.getElementById('depthRoutes');
          var routes = svg.getElementById('routesFG');
          if (depthRoutes) depthRoutes.setAttribute('transform', 'translate(' + (mx*40) + ',' + (my*20) + ')');
          if (routes) routes.setAttribute('transform', 'translate(' + (mx*18) + ',' + (my*9) + ')');
          var vehicles = svg.getElementById('vehicles');
          if (vehicles) vehicles.setAttribute('transform', 'translate(' + (mx*8) + ',' + (my*6) + ')');
        };

        if (supportsPointer) {
          window.addEventListener('pointermove', handler, {passive:true});
        } else {
          window.addEventListener('mousemove', handler, {passive:true});
        }

      } catch (e) {
        console.warn('SVG hero script failed', e);
      }
    })();
  ]]></script></svg>